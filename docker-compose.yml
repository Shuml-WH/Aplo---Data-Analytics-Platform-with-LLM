services:
  ollama:
    image: ollama/ollama:latest
    container_name: aplo-ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'ollama serve' > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G

  pull-model:
    image: ollama/ollama:latest
    container_name: aplo-pull-model
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling llama3.2 model... this may take a few minutes on first run.'
        ollama pull llama3.2
        echo 'Model pull complete.'
      "

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aplo-backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - FLASK_DEBUG=0
    ports:
      - "5001:5000"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aplo-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
  uploads_data:
